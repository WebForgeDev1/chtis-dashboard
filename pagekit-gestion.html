  async function syncToGitHub(updatedMembers) {
    try {
      // 1. Get current SHA
      const infoRes = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
        headers: { Authorization: `Bearer ${GH_TOKEN}`, Accept: "application/vnd.github+json" }
      });
      const info = await infoRes.json();
      const sha = info.sha;
      // 2. Build CA list - only keep nom + role
      const caList = updatedMembers.map(m => ({ nom: `${m.prenom} ${m.nom}`, role: m.role }));
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(caList, null, 2))));
      // 3. Push update
      await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
        method: "PUT",
        headers: { Authorization: `Bearer ${GH_TOKEN}`, Accept: "application/vnd.github+json", "Content-Type": "application/json" },
        body: JSON.stringify({ message: "Mise à jour membres CA", content, sha })
      });
      console.log("✅ GitHub synced");
    } catch(e) {
      console.error("GitHub sync error:", e);
    }
  }

  function handleAddMember(form){
    const newM={...form, id:_nextId++, montant:25, annee:new Date().getFullYear()};
    const updated=[...members, newM];
    setMembers(updated);
    MEMBERS.length=0; updated.forEach(m=>MEMBERS.push(m));
    setShowAddModal(false);
    go("members");
    syncToGitHub(updated);
  }

  function handleEditMember(form){
    const updated=members.map(m=>m.id===form.id?{...m,...form}:m);
    setMembers(updated);
    MEMBERS.length=0; updated.forEach(m=>MEMBERS.push(m));
    setEditMember(null);
    setSel(null);
    syncToGitHub(updated);
  }

  function handleDeleteMember(){
    const updated=members.filter(m=>m.id!==deleteMember.id);
    setMembers(updated);
    MEMBERS.length=0; updated.forEach(m=>MEMBERS.push(m));
    setDeleteMember(null);
    setSel(null);
    syncToGitHub(updated);
  }

  function handleMarkPaid(m){
    const updated=members.map(x=>x.id===m.id?{...x,cotisation:"payée"}:x);
    setMembers(updated);
    MEMBERS.length=0; updated.forEach(x=>MEMBERS.push(x));
    setSel({...m,cotisation:"payée"});
  }

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

  --t6:#E2E8F0;

  /* Dark sidebar tokens */
  --sb-bg:#0F172A;
  --sb-text:rgba(255,255,255,.88);
  --sb-muted:rgba(255,255,255,.4);
  --sb-divider:rgba(255,255,255,.08);
  --sb-hover:rgba(255,255,255,.07);

  --sidebar:258px;
  --r:14px;
  --r-sm:10px;
  --r-xs:7px;

  --sh:0 1px 3px rgba(0,0,0,.05),0 4px 18px rgba(0,0,0,.06);
  --sh-sm:0 1px 4px rgba(0,0,0,.04),0 2px 10px rgba(0,0,0,.05);
  --sh-lg:0 8px 36px rgba(0,0,0,.12);
}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#root{height:100%}
input,button,select,textarea{font-family:'Plus Jakarta Sans',sans-serif}
button{cursor:pointer;border:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--t5);border-radius:6px}

/* LOGIN */
.lp{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(140deg,#0f0c29,#302b63,#1a1040);
  position:relative;overflow:hidden;
}
.lp::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 20% 25%,rgba(102,126,234,.35),transparent 50%),
    radial-gradient(ellipse at 80% 75%,rgba(118,75,162,.28),transparent 50%);
  pointer-events:none;
}
.lp-inner{position:relative;z-index:1}
.lp-blur{display:none}
.lc{
  position:relative;
  background:rgba(255,255,255,.97);
  backdrop-filter:blur(24px);
  border-radius:22px;padding:46px 42px 38px;width:418px;
  box-shadow:0 32px 80px rgba(0,0,0,.38),0 0 0 1px rgba(255,255,255,.12);
}
.lb{text-align:center;margin-bottom:34px}
.li{
  width:66px;height:66px;border-radius:18px;margin:0 auto 18px;
  background:var(--indigo-grad);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 12px 32px rgba(102,126,234,.52);
}
.li svg{width:30px;height:30px;fill:white}
.lb h1{font-size:23px;font-weight:800;color:var(--t1);letter-spacing:-.4px}
.lb p{font-size:13px;color:var(--t3);margin-top:5px}
.fg{margin-bottom:18px}
.fl{display:block;font-size:11.5px;font-weight:700;color:var(--t2);margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase}
.fi{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--t6);border-radius:10px;
  font-size:14px;color:var(--t1);background:#F8FAFE;
  outline:none;transition:all .18s;
}
.fi:focus{border-color:var(--indigo);background:white;box-shadow:0 0 0 4px rgba(102,126,234,.12)}
.fi::placeholder{color:var(--t4)}
.fr{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;font-size:13px}
.fr label{display:flex;align-items:center;gap:7px;color:var(--t3);cursor:pointer}
.fr a{color:var(--indigo);text-decoration:none;font-weight:700}
.lbtn{
  width:100%;padding:13px;
  background:var(--indigo-grad);
  color:white;border:none;border-radius:10px;
  font-size:14px;font-weight:700;
  box-shadow:0 8px 24px rgba(102,126,234,.48);
  transition:all .2s;letter-spacing:.03em;
}
.lbtn:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(102,126,234,.58)}
.lbtn:active{transform:translateY(0)}
.lerr{
  background:#FEF2F2;color:#991B1B;
  border:1px solid #FECACA;border-radius:10px;
  padding:10px 14px;font-size:13px;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.lhint{text-align:center;font-size:12px;color:var(--t4);margin-top:16px}
.lfoot{text-align:center;font-size:11.5px;color:var(--t5);margin-top:8px}

/* SHELL */
.shell{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR - dark */
.sb{
  width:var(--sidebar);
  background:linear-gradient(180deg,#0F172A 0%,#161d34 100%);
  border-right:none;
  display:flex;flex-direction:column;flex-shrink:0;
  box-shadow:4px 0 28px rgba(0,0,0,.22);
  overflow-y:auto;
}
.sb-top{padding:24px 18px 16px}
.sb-logo{display:flex;align-items:center;gap:12px}
.sb-logo-mark{
  width:40px;height:40px;border-radius:12px;flex-shrink:0;
  background:var(--indigo-grad);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(102,126,234,.5);
}
.sb-logo-mark svg{width:20px;height:20px;fill:white}
.sb-name{font-size:14.5px;font-weight:800;color:#fff;letter-spacing:-.2px}
.sb-sub{font-size:11px;color:var(--sb-muted);margin-top:2px}
.sb-divider{height:1px;background:var(--sb-divider);margin:12px 14px}
.sb-nav{flex:1;padding:4px 10px}
.sb-section{
  font-size:10px;font-weight:700;color:rgba(255,255,255,.28);
  letter-spacing:.1em;text-transform:uppercase;padding:14px 10px 5px;
}
.ni{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:10px;
  color:rgba(255,255,255,.62);font-size:13.5px;font-weight:500;
  transition:all .15s;cursor:pointer;margin-bottom:2px;
}
.ni:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.92)}
.ni.active{
  background:rgba(102,126,234,.22);
  color:#fff;font-weight:700;
  box-shadow:inset 0 0 0 1px rgba(102,126,234,.28);
}
.ni-ico{
  width:32px;height:32px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;
}
.ni.active .ni-ico{background:var(--indigo-grad);box-shadow:0 4px 14px rgba(102,126,234,.42)}
.ni.active .ni-ico svg{fill:white}
.ni:not(.active) .ni-ico{background:rgba(255,255,255,.08)}
.ni:not(.active) .ni-ico svg{fill:rgba(255,255,255,.52)}
.ni-ico svg{width:15px;height:15px}
.ni-badge{
  margin-left:auto;
  background:rgba(252,129,129,.18);color:#FC8181;
  border:1px solid rgba(252,129,129,.25);
  font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px;
}
.sb-bot{padding:12px 10px;border-top:1px solid var(--sb-divider)}
.sb-user{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;
  cursor:pointer;transition:background .15s;
}
.sb-user:hover{background:rgba(255,255,255,.07)}
.uav{
  width:36px;height:36px;border-radius:50%;
  background:var(--indigo-grad);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:white;flex-shrink:0;
  box-shadow:0 2px 8px rgba(102,126,234,.45);
}
.sb-uname{font-size:13px;font-weight:700;color:#fff}
.sb-urole{font-size:11px;color:var(--sb-muted)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* TOPBAR */
.tb{
  height:66px;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(226,232,240,.7);
  display:flex;align-items:center;padding:0 28px;gap:14px;flex-shrink:0;
  box-shadow:0 1px 10px rgba(0,0,0,.04);
}
.tb-left{flex:1;min-width:0}
.tb-page{font-size:10px;font-weight:700;color:var(--t4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:1px}
.tb-title{font-size:18px;font-weight:800;color:var(--t1);letter-spacing:-.35px;line-height:1.1}
.tb-right{display:flex;align-items:center;gap:10px}
.tb-search{
  display:flex;align-items:center;gap:8px;
  background:#F8FAFC;border:1.5px solid var(--t6);
  border-radius:10px;padding:8px 14px;width:210px;transition:all .18s;
}
.tb-search:focus-within{background:white;border-color:var(--indigo);box-shadow:0 0 0 3px rgba(102,126,234,.1)}
.tb-search input{border:none;background:transparent;outline:none;font-size:13px;color:var(--t1);width:100%}
.tb-search input::placeholder{color:var(--t4)}
.tb-ico{
  width:38px;height:38px;border-radius:10px;
  background:#F8FAFC;border:1.5px solid var(--t6);
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;position:relative;cursor:pointer;
}
.tb-ico:hover{background:white;border-color:var(--t5);box-shadow:var(--sh-sm)}
.tb-ico svg{width:17px;height:17px;fill:var(--t3)}
.notif-dot{position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;background:#F6AD55;border:2.5px solid white}
.btn-gradient{
  display:flex;align-items:center;gap:7px;padding:9px 18px;
  background:var(--indigo-grad);
  color:white;border:none;border-radius:10px;
  font-size:13px;font-weight:700;
  box-shadow:0 4px 16px rgba(102,126,234,.35);
  transition:all .18s;white-space:nowrap;
}
.btn-gradient:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(102,126,234,.44)}
.tb-av{
  width:36px;height:36px;border-radius:50%;
  background:var(--indigo-grad);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:white;
  border:2px solid rgba(102,126,234,.25);
  box-shadow:0 2px 8px rgba(102,126,234,.3);
}
.tb-uname{font-size:13px;font-weight:700;color:var(--t1)}
.tb-urole{font-size:11px;color:var(--t4)}

/* PAGE */
.page{flex:1;overflow-y:auto;padding:24px 28px}

/* CARD */
.card{
  background:var(--card);border-radius:var(--r);
  box-shadow:var(--sh);
  border:1px solid rgba(226,232,240,.7);
  overflow:hidden;
}
.card-hd{
  display:flex;align-items:center;
  padding:18px 22px;
  border-bottom:1px solid var(--t6);gap:10px;
  background:linear-gradient(180deg,#fff 0%,#fafbff 100%);
}
.card-title{font-size:14.5px;font-weight:800;color:var(--t1);flex:1;letter-spacing:-.15px}
.card-sub{font-size:12px;color:var(--t4);margin-top:2px;font-weight:400}
.card-link{
  font-size:13px;color:var(--indigo);font-weight:700;
  cursor:pointer;white-space:nowrap;transition:color .14s;
}
.card-link:hover{color:var(--indigo-d);text-decoration:underline}

/* GRADIENT STAT CARDS */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.sc{
  border-radius:14px;padding:22px 22px 18px;
  color:white;position:relative;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.15);
  transition:transform .18s,box-shadow .18s;
  cursor:default;
}
.sc:hover{transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,.2)}
.sc-overlay{position:absolute;inset:0;background:radial-gradient(circle at 82% 14%,rgba(255,255,255,.22),transparent 55%);pointer-events:none}
.sc-pattern{position:absolute;right:-16px;bottom:-16px;width:96px;height:96px;border-radius:50%;background:rgba(255,255,255,.1);pointer-events:none}
.sc-pattern2{position:absolute;right:28px;bottom:-36px;width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.07);pointer-events:none}
.sc-label{font-size:11px;font-weight:700;opacity:.82;letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px}
.sc-val{font-size:34px;font-weight:900;letter-spacing:-.6px;line-height:1}
.sc-trend{font-size:12.5px;opacity:.78;margin-top:8px;font-weight:600}

/* LAYOUTS */
.row{display:flex;gap:18px;margin-bottom:18px;align-items:flex-start}
.col{flex:1;min-width:0}
.col-2{flex:1.6;min-width:0}
.col-right{width:300px;flex-shrink:0}
.mb18{margin-bottom:18px}

/* TABLE */
table{width:100%;border-collapse:collapse}
thead th{
  padding:11px 18px;font-size:10.5px;font-weight:700;color:var(--t4);
  text-align:left;
  background:linear-gradient(180deg,#FAFBFF,#F4F6FF);
  border-bottom:1px solid var(--t6);
  text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;
}
tbody tr{border-bottom:1px solid var(--t6);transition:background .12s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#F7F9FF}
td{padding:12px 18px;font-size:13.5px;vertical-align:middle}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:20px;font-size:11.5px;font-weight:700}
.bg{background:#ECFDF5;color:#065F46}
.bo{background:#FFFBEB;color:#92400E}
.br{background:#FEF2F2;color:#991B1B}
.bb{background:#EFF6FF;color:#1E40AF}
.bgr{background:var(--t6);color:var(--t3)}

/* AVATAR */
.mav{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:white;flex-shrink:0;
}

/* RECENT ROWS */
.ri{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--t6);transition:background .12s;cursor:pointer}
.ri:last-child{border-bottom:none}
.ri:hover{background:#FAFBFF}
.ri-main{flex:1;min-width:0}
.ri-name{font-size:13.5px;font-weight:700;color:var(--t1)}
.ri-sub{font-size:12px;color:var(--t4);margin-top:1px}
.ri-date{font-size:12px;color:var(--t4);white-space:nowrap;font-weight:500}

/* MEMBER LIST SIDE */
.ml-i{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--t6);transition:background .12s;cursor:pointer}
.ml-i:last-child{border-bottom:none}
.ml-i:hover{background:#FAFBFF}

/* DOC GRID */
.doc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px}
.doc-item{
  display:flex;align-items:center;gap:11px;padding:12px 14px;
  border:1.5px solid var(--t6);border-radius:var(--r-sm);
  transition:all .14s;cursor:pointer;
}
.doc-item:hover{border-color:rgba(102,126,234,.3);background:#FAFBFF;transform:translateY(-1px);box-shadow:var(--sh-sm)}
.doc-ico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-ico svg{width:18px;height:18px}
.doc-name{font-size:12.5px;font-weight:700;color:var(--t1);line-height:1.3}
.doc-size{font-size:11.5px;color:var(--t4);margin-top:2px}

/* COMPOSE / FORM */
.cf{padding:18px 22px;display:flex;flex-direction:column;gap:13px}
.clabel{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.ci{
  width:100%;padding:10px 13px;
  border:1.5px solid var(--t6);border-radius:10px;
  font-size:13.5px;color:var(--t1);background:#F8FAFC;
  outline:none;transition:all .18s;
}
.ci:focus{border-color:var(--indigo);background:white;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
.ci::placeholder{color:var(--t4)}
.cta{
  width:100%;padding:10px 13px;
  border:1.5px solid var(--t6);border-radius:10px;
  font-size:13.5px;color:var(--t1);background:#F8FAFC;
  outline:none;transition:all .18s;resize:none;min-height:90px;line-height:1.65;
}
.cta:focus{border-color:var(--indigo);background:white;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
.cta::placeholder{color:var(--t4)}
.csel{
  width:100%;padding:10px 13px;
  border:1.5px solid var(--t6);border-radius:10px;
  font-size:13.5px;color:var(--t1);background:#F8FAFC;
  outline:none;cursor:pointer;
}

/* INVOICE GENERATOR */
.ig{padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.ig-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* DRAWER */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.42);z-index:100;display:flex;justify-content:flex-end;animation:fIn .18s ease}
.drawer{width:400px;background:white;height:100%;overflow-y:auto;box-shadow:-12px 0 50px rgba(0,0,0,.16);animation:sIn .22s ease}
@keyframes fIn{from{opacity:0}to{opacity:1}}
@keyframes sIn{from{transform:translateX(32px);opacity:0}to{transform:translateX(0);opacity:1}}
.dr-top{padding:28px 24px 24px;color:white;position:relative;background:linear-gradient(135deg,#4c35c5,#764ba2)}
.dr-close{
  position:absolute;top:14px;right:14px;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);
  color:white;width:30px;height:30px;border-radius:8px;
  font-size:16px;display:flex;align-items:center;justify-content:center;
  transition:background .14s;cursor:pointer;
}
.dr-close:hover{background:rgba(255,255,255,.26)}
.dr-av{
  width:60px;height:60px;border-radius:50%;
  background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:21px;font-weight:800;color:white;margin-bottom:12px;
  border:2.5px solid rgba(255,255,255,.38);
}
.dr-name{font-size:19px;font-weight:800;letter-spacing:-.3px}
.dr-role{font-size:12.5px;opacity:.7;margin-top:4px}
.dr-body{padding:22px}
.dr-st{font-size:10.5px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.09em;margin-bottom:12px}
.ir{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-bottom:1px solid var(--t6)}
.ir:last-child{border-bottom:none}
.ir-ico{width:32px;height:32px;border-radius:9px;background:#F8FAFC;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ir-ico svg{width:14px;height:14px;fill:var(--t3)}
.ir-l{font-size:11px;color:var(--t4);font-weight:600;letter-spacing:.02em}
.ir-v{font-size:13.5px;font-weight:600;color:var(--t1);margin-top:2px}
.act-list{display:flex;flex-direction:column;gap:7px}
.ab{width:100%;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;transition:all .14s;cursor:pointer}
.ab-p{background:var(--indigo-grad);color:white;box-shadow:0 4px 16px rgba(102,126,234,.32)}
.ab-p:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(102,126,234,.42)}
.ab-s{background:#F8FAFC;color:var(--t2);border:1.5px solid var(--t6)}
.ab-s:hover{background:white;border-color:var(--t5);box-shadow:var(--sh-sm)}
.ab-d{background:#FEF2F2;color:#991B1B;border:1.5px solid #FECACA}
.ab-d:hover{background:#FEE2E2}

/* INVOICES */
.pdf-btn{
  padding:5px 11px;border:1.5px solid var(--t6);border-radius:7px;
  background:#F8FAFC;font-size:12px;color:var(--t3);font-weight:600;
  transition:all .13s;cursor:pointer;
}
.pdf-btn:hover{background:white;border-color:var(--t5);box-shadow:var(--sh-sm)}

/* FILTER PILLS */
.fp{
  padding:6px 14px;border-radius:20px;font-size:12.5px;font-weight:600;
  border:1.5px solid var(--t6);background:white;color:var(--t3);
  transition:all .14s;cursor:pointer;
}
.fp:hover{border-color:var(--indigo);color:var(--indigo)}
.fp.active{
  background:var(--indigo-grad);border-color:transparent;color:white;
  box-shadow:0 4px 14px rgba(102,126,234,.35);
}
.srch{
  display:flex;align-items:center;gap:8px;background:white;
  border:1.5px solid var(--t6);border-radius:10px;padding:8px 12px;width:210px;
}
.srch input{border:none;background:transparent;outline:none;font-size:13px;color:var(--t1);width:100%}
.srch input::placeholder{color:var(--t4)}
.srch svg{width:14px;height:14px;fill:var(--t4);flex-shrink:0}

/* SEND BTN */
.send-btn{
  width:100%;padding:12px;
  background:var(--indigo-grad);
  color:white;border:none;border-radius:10px;
  font-size:13.5px;font-weight:700;
  box-shadow:0 4px 18px rgba(102,126,234,.32);
  transition:all .18s;display:flex;align-items:center;justify-content:center;gap:7px;
}
.send-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(102,126,234,.42)}
.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.add-btn{
  display:flex;align-items:center;gap:6px;padding:9px 17px;
  background:var(--indigo-grad);
  color:white;border:none;border-radius:10px;
  font-size:13px;font-weight:700;white-space:nowrap;
  box-shadow:0 4px 14px rgba(102,126,234,.3);transition:all .18s;
}
.add-btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(102,126,234,.42)}

/* TOAST */
.toast{
  position:fixed;bottom:28px;right:28px;z-index:200;
  background:var(--indigo-grad);color:white;
